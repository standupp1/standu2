<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스탠드업 — 통합 앱</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0f11;--bg2:#161719;--bg3:#1e2023;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0f0ee;--text2:#9a9a96;--text3:#5e5e5a;--amber:#f0a830;--amber-dim:rgba(240,168,48,0.12);--teal:#3ecfaa;--teal-dim:rgba(62,207,170,0.1);--coral:#f06060;--coral-dim:rgba(240,96,96,0.1);--blue:#5b9cf6;--blue-dim:rgba(91,156,246,0.1);--green:#5bcf7e;--green-dim:rgba(91,207,126,0.1);--purple:#a78bfa;--purple-dim:rgba(167,139,250,0.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;min-height:100vh;line-height:1.6}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--amber);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:#0e0f11}
.logo-text{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.5px}
.sidebar-section{padding:16px 12px 8px}
.sidebar-label{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;margin-bottom:1px;border:1px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--amber-dim);color:var(--amber);border-color:rgba(240,168,48,.2);font-weight:500}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;font-size:10px;font-family:'DM Mono',monospace;background:var(--coral-dim);color:var(--coral);padding:1px 6px;border-radius:10px}
.sidebar-bottom{margin-top:auto;padding:16px 12px;border-top:1px solid var(--border)}
.members-row{display:flex;align-items:center;gap:6px;padding:8px 10px}
.member-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1.5px solid var(--bg2)}
.members-label{font-size:11px;color:var(--text3);margin-left:2px}
.main{flex:1;min-width:0;padding:32px 36px;overflow-y:auto;overflow-x:hidden}
.main-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px}
.page-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px;line-height:1.2}
.page-sub{font-size:13px;color:var(--text3);margin-top:4px;font-weight:300}
.header-right{display:flex;align-items:center;gap:10px}
.event-badge{display:flex;align-items:center;gap:6px;background:var(--teal-dim);border:1px solid rgba(62,207,170,.2);color:var(--teal);padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.btn:hover{background:#2a2c30;border-color:rgba(255,255,255,.18)}
.btn-primary{background:var(--amber);color:#0e0f11;border-color:transparent;font-weight:700}
.btn-primary:hover{background:#e09a20}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s;animation:fadeUp .4s ease both}
.kpi-card:hover{border-color:var(--border2)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0}
.kpi-card.amber::before{background:var(--amber)}
.kpi-card.teal::before{background:var(--teal)}
.kpi-card.coral::before{background:var(--coral)}
.kpi-card.blue::before{background:var(--blue)}
.kpi-card:nth-child(1){animation-delay:.05s}
.kpi-card:nth-child(2){animation-delay:.1s}
.kpi-card:nth-child(3){animation-delay:.15s}
.kpi-card:nth-child(4){animation-delay:.2s}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:10px;letter-spacing:.3px}
.kpi-value{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.8px;line-height:1;font-family:'DM Mono',monospace}
.kpi-value span{font-size:13px;font-weight:400;color:var(--text2);margin-right:2px;font-family:'Noto Sans KR',sans-serif}
.kpi-change{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-family:'DM Mono',monospace;margin-top:8px;padding:2px 6px;border-radius:4px}
.kpi-change.up{background:var(--green-dim);color:var(--green)}
.kpi-change.neutral{background:var(--bg3);color:var(--text3)}
.grid-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeUp .4s ease both;animation-delay:.25s}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.panel-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.panel-title-dot{width:6px;height:6px;border-radius:50%}
.panel-action{font-size:11px;color:var(--text3);cursor:pointer;transition:color .15s}
.panel-action:hover{color:var(--amber)}
.panel-body{padding:16px 20px}
.tx-list{display:flex;flex-direction:column;gap:2px}
.tx-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:8px;transition:background .15s;cursor:pointer}
.tx-item:hover{background:var(--bg3)}
.tx-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.tx-amount{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;flex-shrink:0}
.tx-amount.out{color:var(--coral)}
.tx-amount.in{color:var(--teal)}
.balance-display{padding:20px;background:var(--bg3);border-radius:10px;margin-bottom:14px;display:flex;align-items:flex-end;justify-content:space-between}
.balance-label{font-size:11px;color:var(--text3);margin-bottom:6px;letter-spacing:.5px}
.balance-value{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;color:var(--amber);letter-spacing:-1px}
.balance-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.input-field{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s}
.input-field::placeholder{color:var(--text3)}
.input-field:focus{border-color:var(--amber)}
.goods-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.goods-item{background:var(--bg3);border-radius:8px;padding:12px;border:1px solid var(--border);transition:border-color .15s;cursor:pointer}
.goods-item:hover{border-color:var(--border2)}
.goods-name{font-size:12px;color:var(--text);font-weight:500;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goods-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.status-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;margin-top:6px}
.tag-good{background:var(--green-dim);color:var(--green)}
.tag-warn{background:rgba(240,168,48,.12);color:var(--amber)}
.tag-danger{background:var(--coral-dim);color:var(--coral)}
.tag-making{background:var(--blue-dim);color:var(--blue)}
.chart-area{height:120px;position:relative;margin:4px 0}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:100%;padding-bottom:20px}
.chart-bar-wrap{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;cursor:pointer}
.chart-bar{width:100%;border-radius:4px 4px 0 0;background:var(--bg3);transition:background .2s}
.chart-bar.active{background:var(--amber)}
.chart-bar:hover{background:var(--border2)}
.chart-bar.active:hover{background:var(--amber)}
.chart-bar-label{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;text-align:center;width:100%}
.stock-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.stock-item:last-child{border-bottom:none}
.stock-name{flex:1;font-size:13px;color:var(--text)}
.stock-count{font-size:12px;font-family:'DM Mono',monospace;color:var(--text2);min-width:50px;text-align:right}
.stock-bar{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.kanban-col-title{font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;padding:0 0 10px;display:flex;align-items:center;gap:6px}
.kanban-count{background:var(--bg3);color:var(--text3);font-size:10px;font-family:'DM Mono',monospace;padding:1px 5px;border-radius:4px}
.kanban-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.kanban-card:hover{border-color:var(--border2)}
.kanban-card-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px}
.kanban-card-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.applicant-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s}
.applicant-item:hover{background:var(--bg3)}
.applicant-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.applicant-name{font-size:13px;font-weight:500;color:var(--text)}
.applicant-role{font-size:11px;color:var(--text3)}
.applicant-event{margin-left:auto;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.add-tx-form{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;display:none}
.add-tx-form.open{display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.form-select{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;transition:border-color .15s}
.form-select:focus{border-color:var(--amber)}
.divider{height:1px;background:var(--border);margin:6px 0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.event-list{display:flex;flex-direction:column;gap:2px}
.event-row{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:8px;transition:background .15s;cursor:pointer}
.event-row:hover{background:var(--bg3)}
.event-row.past{opacity:.6}
.event-date-col{text-align:center;min-width:34px;flex-shrink:0}
.event-month{font-size:9px;font-weight:500;font-family:'DM Mono',monospace;letter-spacing:1px;color:var(--text3);text-transform:uppercase}
.event-day{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);line-height:1}
.event-info{flex:1;min-width:0}
.event-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-meta{font-size:11px;color:var(--text3);margin-top:1px}
.event-status-tag{font-size:10px;font-weight:500;padding:3px 8px;border-radius:10px;flex-shrink:0;font-family:'DM Mono',monospace}
.tag-upcoming{background:var(--purple-dim);color:var(--purple)}
.tag-planning{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.tag-done{background:var(--green-dim);color:var(--green)}
.tx-table{width:100%;border-collapse:collapse}
.tx-table th{font-size:11px;color:var(--text3);font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);letter-spacing:.5px}
.tx-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.tx-table tr:last-child td{border-bottom:none}
.tx-table tr:hover td{background:var(--bg3)}
.tx-cat{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:10px;font-family:'DM Mono',monospace}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:420px;animation:fadeUp .2s ease}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px}
.form-field{margin-bottom:14px}
.form-field label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px}
.form-field input,.form-field select,.form-field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s}
.form-field input:focus,.form-field select:focus{border-color:var(--amber)}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.filter-btn:hover{background:var(--bg3);color:var(--text)}
.filter-btn.on{background:var(--amber-dim);color:var(--amber);border-color:rgba(240,168,48,.3)}
.member-share-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.member-share-row:last-child{border-bottom:none}


.event-select-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.event-chip{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.event-chip:hover{border-color:var(--border2);color:var(--text)}
.event-chip.on{background:var(--amber-dim);color:var(--amber);border-color:rgba(240,168,48,.3);font-weight:500}
.pnl-section-title{font-size:11px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;font-weight:500}
.pnl-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.pnl-row:last-child{border-bottom:none}
.pnl-row-label{font-size:13px;color:var(--text2)}
.pnl-row-value{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
.pnl-row.total .pnl-row-label{font-weight:700;color:var(--text);font-size:14px}
.pnl-row.total .pnl-row-value{font-size:16px}
.history-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.history-row:hover{background:var(--bg3)}
.history-row:last-child{border-bottom:none}


.cost-table{width:100%;border-collapse:collapse}
.cost-table th{font-size:11px;color:var(--text3);font-weight:500;padding:8px 14px;border-bottom:1px solid var(--border);text-align:left;letter-spacing:.4px}
.cost-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.cost-table tr:last-child td{border-bottom:none}
.cost-table tr:hover td{background:var(--bg3)}
.rate-cell{display:flex;align-items:center;gap:8px}
.rate-bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.rate-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.sim-panel{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.sim-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.sim-label{font-size:12px;color:var(--text3);min-width:80px}
.sim-input{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;outline:none;width:100px;text-align:right;transition:border-color .15s}
.sim-input:focus{border-color:var(--amber)}
.sim-result{font-size:20px;font-weight:700;font-family:'DM Mono',monospace}


.order-table{width:100%;border-collapse:collapse}
.order-table th{font-size:11px;color:var(--text3);font-weight:500;padding:8px 14px;border-bottom:1px solid var(--border);text-align:left;letter-spacing:.4px}
.order-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.order-table tr:last-child td{border-bottom:none}
.order-table tr:hover td{background:var(--bg3);cursor:pointer}
.pkg-tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:6px}
.pkg-o{background:var(--green-dim);color:var(--green)}
.pkg-x{background:var(--bg3);color:var(--text3)}


.inv-table{width:100%;border-collapse:collapse}
.inv-table th{font-size:11px;color:var(--text3);font-weight:500;padding:8px 14px;border-bottom:1px solid var(--border);text-align:left;letter-spacing:.4px}
.inv-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.inv-table tr:last-child td{border-bottom:none}
.inv-table tr:hover td{background:var(--bg3)}
.margin-bar{height:5px;border-radius:3px;background:var(--border);overflow:hidden;width:60px;display:inline-block}


.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kanban-col-wrap{background:var(--bg3);border-radius:12px;padding:14px;border:1px solid var(--border)}
.kanban-col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kanban-col-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.kanban-card-full{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative}
.kanban-card-full:hover{border-color:var(--border2);transform:translateY(-1px)}
.kanban-card-full:last-child{margin-bottom:0}
.kc-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px}
.kc-goods{font-size:11px;color:var(--text2);margin-bottom:6px}
.kc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.kc-site{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.drop-zone{min-height:40px}


.artist-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s;cursor:pointer}
.artist-card:hover{border-color:var(--border2)}
.artist-card-header{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.artist-avatar-lg{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.artist-card-body{padding:14px 18px}
.artist-link{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--blue);text-decoration:none;transition:opacity .15s}
.artist-link:hover{opacity:.7}
.recruit-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
.recruit-row:hover{background:var(--bg3)}
.recruit-row:last-child{border-bottom:none}
.recruit-status{font-size:10px;padding:2px 8px;border-radius:10px;font-family:'DM Mono';flex-shrink:0}
.rs-done{background:var(--green-dim);color:var(--green)}
.rs-pending{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.rs-x{background:var(--coral-dim);color:var(--coral)}


.vendor-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;transition:border-color .2s;cursor:pointer}
.vendor-card:hover{border-color:var(--border2)}
.vendor-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.vendor-type{display:inline-flex;font-size:10px;padding:2px 8px;border-radius:10px;margin-bottom:10px}
.vendor-price{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:var(--amber)}
.vendor-price-unit{font-size:11px;color:var(--text3);font-family:'Noto Sans KR',sans-serif;margin-left:2px}
.vendor-detail{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.7}
.vendor-contact{margin-top:10px;font-size:11px;color:var(--blue);font-family:'DM Mono',monospace;word-break:break-all}
.vendor-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--blue);text-decoration:none;margin-top:6px;transition:opacity .15s}
.vendor-link:hover{opacity:.7}
.discount-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:var(--green-dim);color:var(--green);padding:2px 8px;border-radius:10px;margin-top:6px}



.row-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
tr:hover .row-actions,.kanban-card-full:hover .row-actions,.recruit-row:hover .row-actions,.vendor-card:hover .row-actions,.event-row:hover .row-actions{opacity:1}
.act-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;line-height:1}
.act-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.act-btn.del:hover{background:var(--coral-dim);color:var(--coral);border-color:var(--coral)}
.act-btn.edit:hover{background:var(--amber-dim);color:var(--amber);border-color:var(--amber)}
td.act-col{width:70px;text-align:right;padding-right:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:480px;max-width:96vw;animation:fadeUp .2s ease;max-height:90vh;overflow-y:auto}
.mbox.wide{width:560px}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mtitle{font-size:16px;font-weight:700;color:var(--text)}
.mclose{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.mclose:hover{background:var(--coral-dim);color:var(--coral)}
.mf{margin-bottom:14px}
.mf label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px}
.mf input,.mf select,.mf textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s}
.mf input:focus,.mf select:focus{border-color:var(--amber)}
.mf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}


/* ── 로그인 오버레이 ── */
#login-screen {
  position: fixed; inset: 0; z-index: 10000;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
#login-screen.hide {
  animation: fadeOut .3s ease forwards;
  pointer-events: none;
}
@keyframes fadeOut { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(1.03)} }

.login-logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 48px;
}
.login-logo-icon {
  width: 48px; height: 48px; background: var(--amber);
  border-radius: 12px; display: flex; align-items: center;
  justify-content: center; font-family: 'DM Mono', monospace;
  font-size: 20px; font-weight: 700; color: #0e0f11;
}
.login-logo-text { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -.5px; }
.login-logo-sub  { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

.login-title {
  font-size: 15px; color: var(--text2); margin-bottom: 28px;
  font-weight: 400; letter-spacing: .3px;
}

.member-cards {
  display: grid; grid-template-columns: repeat(2, 160px); gap: 14px;
  margin-bottom: 36px;
}
.member-card {
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 24px 20px;
  cursor: pointer; transition: all .2s; text-align: center;
  position: relative; overflow: hidden;
}
.member-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  border-radius: 16px 16px 0 0;
  opacity: 0; transition: opacity .2s;
}
.member-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.member-card:hover::before { opacity: 1; }
.member-card.active {
  border-color: transparent; transform: translateY(-2px);
  box-shadow: 0 0 0 2px var(--accent-color);
}
.member-card.active::before { opacity: 1; }

.mc-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700;
  margin: 0 auto 12px;
}
.mc-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.mc-role { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.mc-online {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; margin-top: 8px;
  padding: 2px 8px; border-radius: 10px;
}
.mc-online.on  { background: var(--green-dim);  color: var(--green); }
.mc-online.off { background: var(--bg3); color: var(--text3); }

.login-btn {
  width: 334px; padding: 13px;
  background: var(--amber); color: #0e0f11;
  border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
  opacity: .4; pointer-events: none;
}
.login-btn.ready { opacity: 1; pointer-events: all; }
.login-btn.ready:hover { background: #e09a20; transform: translateY(-1px); }
.login-btn.ready:active { transform: translateY(0); }

/* 사이드바 하단 접속자 표시 업데이트 */
.online-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); display: inline-block;
  animation: pulse 2s infinite;
}
.members-row { flex-wrap: wrap; gap: 4px; }


/* ═══════════════════════════════════════
   모바일 반응형 (768px 이하)
═══════════════════════════════════════ */
@media (max-width: 768px) {

  /* ── 앱 레이아웃 ── */
  .app { flex-direction: column; }

  /* ── 사이드바 → 하단 탭바로 변경 ── */
  .sidebar {
    width: 100%;
    height: auto;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    top: auto;
    flex-direction: row;
    border-right: none;
    border-top: 1px solid var(--border);
    z-index: 100;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 0;
  }
  .sidebar-logo { display: none; }
  .sidebar-bottom { display: none; }
  .sidebar-section {
    display: flex;
    flex-direction: row;
    padding: 0;
    gap: 0;
  }
  .sidebar-label { display: none; }
  .nav-item {
    flex-direction: column;
    gap: 3px;
    padding: 8px 10px;
    border-radius: 0;
    margin-bottom: 0;
    min-width: 64px;
    font-size: 9px;
    text-align: center;
    border: none;
    white-space: nowrap;
  }
  .nav-item .nav-icon { width: 20px; height: 20px; }
  .nav-badge { display: none; }
  .nav-item.active {
    border: none;
    border-top: 2px solid var(--amber);
    background: var(--amber-dim);
  }

  /* ── 메인 컨텐츠 ── */
  .main {
    padding: 16px 14px 80px; /* 하단 탭바 높이만큼 패딩 */
    overflow-y: auto;
    height: 100vh;
  }

  /* ── 헤더 ── */
  .main-header {
    flex-direction: column;
    gap: 12px;
    margin-bottom: 18px;
  }
  .header-right {
    flex-wrap: wrap;
    gap: 8px;
  }
  .page-title { font-size: 18px; }
  .event-badge { font-size: 11px; }

  /* ── KPI 카드: 2열 ── */
  .kpi-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .kpi-value { font-size: 18px; }

  /* ── 2단 → 1단 ── */
  .grid-2col { grid-template-columns: 1fr; }
  .grid-3col { grid-template-columns: 1fr; }

  /* ── 칸반 보드: 가로 스크롤 ── */
  .kanban-board {
    grid-template-columns: repeat(4, 240px);
    overflow-x: auto;
    padding-bottom: 8px;
  }

  /* ── 테이블: 카드형으로 (별도 CSS 블록에서 처리) ── */

  /* ── 패널 헤더 ── */
  .panel-header {
    flex-wrap: wrap;
    gap: 8px;
  }
  .panel-title { font-size: 12px; }

  /* ── 거래 내역 ── */
  .balance-display {
    flex-direction: column;
    gap: 8px;
  }
  .balance-value { font-size: 22px; }

  /* ── 모달 ── */
  .mbox, .mbox.wide {
    width: 96vw;
    padding: 20px 16px;
    max-height: 85vh;
  }
  .mf-row { grid-template-columns: 1fr; }

  /* ── 굿즈 원가 시뮬레이터 ── */
  .sim-panel > div:nth-child(2) {
    grid-template-columns: 1fr 1fr;
  }

  /* ── 작가 카드 ── */
  .artist-card { font-size: 12px; }
  div[style*="grid-template-columns: repeat(4"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  /* ── 멤버 카드 (로그인) ── */
  .member-cards {
    grid-template-columns: repeat(2, 140px);
    gap: 10px;
  }
  .member-card { padding: 18px 14px; }
  .mc-avatar { width: 46px; height: 46px; font-size: 18px; }
  .login-btn { width: 90vw; max-width: 300px; }

  /* ── 제작 업체 카드 ── */
  #vendor-grid {
    grid-template-columns: 1fr !important;
  }

  /* ── 행사 일정 ── */
  .event-row { flex-wrap: wrap; gap: 6px; }

  /* ── 필터 버튼 ── */
  .filter-bar { flex-wrap: wrap; }

  /* ── 차트 ── */
  .chart-area { height: 100px; }

  /* ── 재고 현황 ── */
  .stock-bar { width: 50px; }

  /* ── 수정/삭제 버튼 항상 표시 (hover 없는 모바일) ── */
  .row-actions { opacity: 1 !important; }
  td.act-col { width: 56px; }
  .act-btn { width: 24px; height: 24px; font-size: 11px; }
}

/* ── 아주 작은 화면 (400px 이하) ── */
@media (max-width: 400px) {
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .kpi-value { font-size: 16px; }
  .nav-item { min-width: 52px; font-size: 8px; padding: 8px 6px; }
  .member-cards { grid-template-columns: repeat(2, 130px); }
}


/* ── 모바일 테이블 → 카드형 변환 ── */
@media (max-width: 768px) {

  /* 회계 테이블 */
  .tx-table thead { display: none; }
  .tx-table tr {
    display: flex;
    flex-wrap: wrap;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    gap: 4px;
    position: relative;
  }
  .tx-table td {
    display: inline;
    border: none;
    padding: 0;
    font-size: 13px;
    white-space: normal;
    word-break: keep-all;
  }
  /* 날짜 */
  .tx-table td:nth-child(1) {
    display: block;
    width: 100%;
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    margin-bottom: 2px;
  }
  /* 내용 */
  .tx-table td:nth-child(2) {
    display: block;
    width: 100%;
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 2px;
  }
  /* 참고 */
  .tx-table td:nth-child(3) {
    display: block;
    font-size: 11px;
    color: var(--text3);
    width: 100%;
    margin-bottom: 4px;
  }
  /* 입금 */
  .tx-table td:nth-child(4) {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 14px;
  }
  /* 지출 */
  .tx-table td:nth-child(5) {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 14px;
  }
  /* 잔고 */
  .tx-table td:nth-child(6) {
    display: block;
    width: 100%;
    text-align: right;
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    position: absolute;
    top: 12px;
    right: 60px;
  }
  /* 수정/삭제 버튼 */
  .tx-table td.act-col {
    position: absolute;
    top: 10px;
    right: 10px;
    width: auto;
    padding: 0;
  }
  .tx-table { min-width: unset !important; width: 100%; }

  /* 원가 테이블 → 카드형 */
  .cost-table { min-width: unset !important; width: 100%; }
  .cost-table thead { display: none; }
  .cost-table tr {
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    gap: 4px 8px;
    position: relative;
  }
  .cost-table td { border: none; padding: 0; font-size: 12px; white-space: normal; word-break: keep-all; }
  .cost-table td:nth-child(1) { grid-column: 1/3; font-weight: 600; font-size: 14px; color: var(--text); }
  .cost-table td:nth-child(2) { font-size: 11px; color: var(--text3); }
  .cost-table td:nth-child(3)::before { content: "제작 "; color: var(--text3); font-size: 10px; }
  .cost-table td:nth-child(4)::before { content: "원가 "; color: var(--text3); font-size: 10px; }
  .cost-table td:nth-child(5)::before { content: "판매 "; color: var(--text3); font-size: 10px; }
  .cost-table td:nth-child(6) { display: none; }
  .cost-table td:nth-child(7) { display: none; }
  .cost-table td:nth-child(8) { grid-column: 1/3; }
  .cost-table td:nth-child(9) { grid-column: 1/2; }
  .cost-table td.act-col { position: absolute; top: 10px; right: 10px; grid-column: unset; }

  /* 제작 의뢰 테이블 → 카드형 */
  .order-table { min-width: unset !important; width: 100%; }
  .order-table thead { display: none; }
  .order-table tr {
    display: flex;
    flex-wrap: wrap;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    gap: 4px 8px;
    position: relative;
  }
  .order-table td { border: none; padding: 0; white-space: normal; word-break: keep-all; }
  .order-table td:nth-child(1) { font-weight: 700; font-size: 13px; }
  .order-table td:nth-child(2) { width: 100%; font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .order-table td:nth-child(3)::before { content: "멤버: "; font-size: 10px; color: var(--text3); }
  .order-table td:nth-child(4)::before { content: "수량: "; font-size: 10px; color: var(--text3); }
  .order-table td:nth-child(5) { }
  .order-table td:nth-child(6) { font-size: 11px; color: var(--text3); }
  .order-table td:nth-child(7) { }
  .order-table td:nth-child(8) { display: none; }
  .order-table td.act-col { position: absolute; top: 10px; right: 10px; }

  /* 재고/판매 테이블 → 카드형 */
  .inv-table { min-width: unset !important; width: 100%; }
  .inv-table thead { display: none; }
  .inv-table tr {
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    gap: 4px 8px;
    position: relative;
  }
  .inv-table td { border: none; padding: 0; font-size: 12px; white-space: normal; word-break: keep-all; }
  .inv-table td:nth-child(1) { font-weight: 700; }
  .inv-table td:nth-child(2) { grid-column: 1/3; font-weight: 600; font-size: 14px; }
  .inv-table td:nth-child(3)::before { content: "생산 "; color: var(--text3); font-size: 10px; }
  .inv-table td:nth-child(4) { display: none; }
  .inv-table td:nth-child(5)::before { content: "판매가 "; color: var(--text3); font-size: 10px; }
  .inv-table td:nth-child(6)::before { content: "재고 "; color: var(--text3); font-size: 10px; }
  .inv-table td:nth-child(7)::before { content: "판매 "; color: var(--text3); font-size: 10px; }
  .inv-table td:nth-child(8)::before { content: "매출 "; color: var(--text3); font-size: 10px; }
  .inv-table td:nth-child(9) { display: none; }
  .inv-table td:nth-child(10)::before { content: "마진 "; color: var(--text3); font-size: 10px; }
  .inv-table td.act-col { position: absolute; top: 10px; right: 10px; }

  /* 패널 overflow 수정 */
  .panel { overflow: visible; }
  .panel-body { overflow-x: visible; }
}

</style>
</head>

let currentPage = null;
const NAV_MAP = {'dashboard':'대시보드','accounting':'회계 / 모임통장','pnl':'행사 손익','cost':'원가 관리','orders':'제작 의뢰','inventory':'재고·판매','kanban':'굿즈제작 작업현황','artists':'작가 / 모집','vendors':'제작 업체','permissions':'권한 관리','settings':'설정'};

function navigate(pageKey) {
  const main = document.getElementById('main-content');
  if (!PAGES[pageKey]) { console.error('No page:', pageKey); return; }
  main.innerHTML = PAGES[pageKey];
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => {
    const t = n.textContent.trim();
    if (NAV_MAP[pageKey] && (t === NAV_MAP[pageKey] || t.startsWith(NAV_MAP[pageKey]))) n.classList.add('active');
  });
  if (PAGE_INITS[pageKey]) { try { PAGE_INITS[pageKey](); } catch(e) { console.error('Init error', pageKey, e); } }
  currentPage = pageKey;
  main.scrollTop = 0;
}
function setNav(el) {
  const t = el.textContent.trim();
  for (const [k, lbl] of Object.entries(NAV_MAP)) {
    if (t === lbl || t.startsWith(lbl)) { navigate(k); return; }
  }
}

function openModal(){
  document.getElementById('modal').classList.add('open');
  document.getElementById('m-date').value = new Date().toISOString().split('T')[0];
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function submitTx(){
  const date = document.getElementById('m-date').value;
  const type = document.getElementById('m-type').value;
  const desc = document.getElementById('m-desc').value.trim();
  const amount = parseInt(document.getElementById('m-amount').value)||0;
  const note = document.getElementById('m-note').value.trim();
  if(!desc||!amount){alert('내용과 금액을 입력해주세요.');return;}
  const lastBal = txData[0]?.balance||0;
  const newBal = type==='in' ? lastBal+amount : lastBal-amount;
  txData.unshift({date,desc,note,type,amount,balance:newBal});
  document.getElementById('balance-display').textContent = newBal.toLocaleString();
  if(window.fbSave)fbSave('txData');
  closeModal();
  document.getElementById('m-desc').value='';
  document.getElementById('m-amount').value='';
  document.getElementById('m-note').value='';
}

function calcSim(){
  const qty = parseInt(document.getElementById('sim-qty').value)||0;
  const cost = parseInt(document.getElementById('sim-cost').value)||0;
  const price = parseInt(document.getElementById('sim-price').value)||0;
  const sell = parseInt(document.getElementById('sim-sell').value)||0;
  const totalCost = qty*cost;
  const revenue = sell*price;
  const profit = revenue - totalCost;
  const rate = price>0?Math.round(cost/price*100):0;
  const rColor = rate>=50?'var(--coral)':rate>=35?'var(--amber)':'var(--green)';
  const pColor = profit>=0?'var(--teal)':'var(--coral)';
  document.getElementById('sim-output').innerHTML = `
    <div style="background:var(--bg2);border-radius:8px;padding:12px;border:1px solid var(--border)">
      <div style="font-size:10px;color:var(--text3);margin-bottom:6px">총 제작원가</div>
      <div style="font-size:18px;font-weight:700;font-family:'DM Mono';color:var(--coral)">₩${totalCost.toLocaleString()}</div>
    </div>
    <div style="background:var(--bg2);border-radius:8px;padding:12px;border:1px solid var(--border)">
      <div style="font-size:10px;color:var(--text3);margin-bottom:6px">원가율</div>
      <div style="font-size:18px;font-weight:700;font-family:'DM Mono';color:${rColor}">${rate}%</div>
    </div>
    <div style="background:var(--bg2);border-radius:8px;padding:12px;border:1px solid var(--border)">
      <div style="font-size:10px;color:var(--text3);margin-bottom:6px">예상 수익</div>
      <div style="font-size:18px;font-weight:700;font-family:'DM Mono';color:${pColor}">${profit>=0?'+':''}₩${profit.toLocaleString()}</div>

}

function renderBoard(){
  const board = document.getElementById('kanban-board');
  board.innerHTML = '';
  cols.forEach(col=>{
    const items = tasks.filter(t=>t.status===col.key);
    const wrap = document.createElement('div');
    wrap.className='kanban-col-wrap';
    wrap.innerHTML=`
      <div class="kanban-col-head">
        <span class="kanban-col-label" style="color:${col.color}">${col.key}</span>
        <span class="kanban-count">${items.length}</span>
      </div>
      <div class="drop-zone" id="col-${col.key}">
        ${items.map(t=>`
          <div class="kanban-card-full" data-id="${t.id}" style="${col.border?'border-color:'+col.border:''}">
            <div style='display:flex;justify-content:space-between;align-items:flex-start;gap:4px'><div style='min-width:0'><div class="kc-title" style="color:${acKanban[t.artist]||'var(--text)'}">${t.artist}</div>
            <div class="kc-goods">${t.goods} · ${t.member}</div>
            <div class="kc-meta">
              <span class="status-tag ${t.genre==='미츄'?'tag-warn':'tag-making'}" style="margin:0;font-size:9px">${t.genre}</span>
              <span class="kc-site">${t.site}</span>
              ${t.note?`<span class="status-tag tag-good" style="margin:0;font-size:9px">${t.note}</span>`:''}
            </div></div><div class='row-actions' style='flex-direction:column;gap:3px;opacity:1'><button class='act-btn edit' onclick='event.stopPropagation();editTask(${t.id})' title='수정'>✎</button><button class='act-btn del' onclick='event.stopPropagation();deleteTask(${t.id})' title='삭제'>✕</button></div></div>
          </div>`).join('')}
      </div>`;
    board.appendChild(wrap);
  });
  document.getElementById('cnt-wait').textContent = tasks.filter(t=>t.status==='대기').length;
  document.getElementById('cnt-wip').textContent = tasks.filter(t=>t.status==='제작중').length;
  document.getElementById('cnt-repro').textContent = tasks.filter(t=>t.status==='재생산').length;
  document.getElementById('cnt-done').textContent = tasks.filter(t=>t.status==='완료').length;

  // 상태 변경 클릭
  document.querySelectorAll('.kanban-card-full').forEach(card=>{
    card.addEventListener('click', ()=>{
      const id = parseInt(card.dataset.id);
      const task = tasks.find(t=>t.id===id);
      const order = ['대기','제작중','재생산','완료'];
      const next = order[(order.indexOf(task.status)+1)%order.length];
      task.status = next;
    });
  });
}

function gv(id){return document.getElementById('ef-'+id)?.value||'';}
function gn(id){return parseFloat(document.getElementById('ef-'+id)?.value)||0;}
function mfields(...fields){
  let html='';
  for(let i=0;i<fields.length;i+=2){
    html+=i+1<fields.length?`<div class="mf-row">${_f(fields[i])}${_f(fields[i+1])}</div>`:_f(fields[i]);
  }
  return html;
}
function _f(f){
  const v=f.val!=null?String(f.val).replace(/"/g,'&quot;'):'';
  if(f.type==='select'){
    const opts=(f.opts||[]).map(o=>{const ov=typeof o==='object'?o.v:o,ol=typeof o==='object'?o.l:o;return `<option value="${ov}"${String(f.val)===String(ov)?' selected':''}>${ol}</option>`;}).join('');
    return `<div class="mf"><label>${f.l}</label><select id="ef-${f.id}">${opts}</select></div>`;
  }
  return `<div class="mf"><label>${f.l}</label><input type="${f.type||'text'}" id="ef-${f.id}" value="${v}" placeholder="${f.ph||''}"></div>`;
}

// ── 로그인 & 접속자 관리 ───────────────────────────────────────────
const MEMBERS = {
  '현지지': { color: '#f0a830', initial: '현' },
  '감찬':   { color: '#3ecfaa', initial: '감' },
  '안알려줌': { color: '#a78bfa', initial: '안' },
  '디네':   { color: '#5b9cf6', initial: '디' },
};

// localStorage로 접속자 상태 공유 (같은 기기에서의 간단한 구현)
// 실제 멀티유저는 서버가 필요하지만, 여기선 localStorage + storage 이벤트 활용
const STORAGE_KEY = 'standup_online_members';
let currentMember = null;
let selectedCard  = null;

function getOnlineMembers() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function setOnline(member) {
  const online = getOnlineMembers();
  online[member] = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(online));
}

function setOffline(member) {
  const online = getOnlineMembers();
  delete online[member];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(online));
}

function refreshOnlineStatus(externalList) {
  // Firebase 리스너에서 받은 목록이 있으면 우선 사용
  // 없으면 localStorage fallback
  let activeNames;
  if (externalList) {
    activeNames = externalList;
  } else {
    const online = getOnlineMembers();
    const now = Date.now();
    activeNames = Object.entries(online)
      .filter(([,ts]) => now - ts < 10 * 60 * 1000)
      .map(([n]) => n);
  }

  // 로그인 화면 카드 업데이트
  Object.keys(MEMBERS).forEach(name => {
    const isOn = activeNames.includes(name);
    const el = document.getElementById('mc-online-' + name);
    if (el) {
      el.className = 'mc-online ' + (isOn ? 'on' : 'off');
      el.textContent = isOn ? '● 온라인' : '● 오프라인';
    }
  });

  // 사이드바 접속자 업데이트
  updateSidebarOnline(activeNames);
}

function updateSidebarOnline(onlineList) {
  const row = document.querySelector('.members-row');
  if (!row) return;
  row.innerHTML = Object.entries(MEMBERS).map(([name, info]) => {
    const isOn = onlineList.includes(name);
    const isCurrent = name === currentMember;
    return `<div class="member-avatar" title="${name}${isOn ? ' (온라인)' : ''}" style="
      background:${info.color}22;color:${info.color};
      width:28px;height:28px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;
      border:${isCurrent ? '2px solid '+info.color : '1.5px solid var(--bg2)'};
      position:relative;opacity:${isOn?1:0.35};
      cursor:default;
    ">${info.initial}${isOn ? '<span style="position:absolute;bottom:0;right:0;width:7px;height:7px;border-radius:50%;background:var(--green);border:1.5px solid var(--bg2)"></span>' : ''}</div>`;
  }).join('') + `<span class="members-label" style="font-size:11px;color:var(--text3);margin-left:4px">${onlineList.length}명 접속 중</span>`;
}

function selectMember(card) {
  document.querySelectorAll('.member-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  card.style.setProperty('--accent-color', card.dataset.color);
  card.style.boxShadow = `0 0 0 2px ${card.dataset.color}`;
  selectedCard = card;

  const btn = document.getElementById('login-btn');
  btn.classList.add('ready');
  btn.textContent = `${card.dataset.member}(으)로 입장하기`;
}

function doLogin() {
  if (!selectedCard) return;
  const member = selectedCard.dataset.member;
  currentMember = member;

  // 접속 등록
  setOnline(member);
  // Firebase 온라인 등록 (SDK 로드 대기)
  const tryFbOnline = () => {
    if(window.fbSetOnline) {
      fbSetOnline(member);
    } else {
      setTimeout(tryFbOnline, 500);
    }
  };
  tryFbOnline();

  // heartbeat: 30초마다 갱신 (localStorage + Firebase)
  setInterval(() => {
    if (currentMember) {
      setOnline(currentMember);
      if(window.fbSetOnline) fbSetOnline(currentMember);
    }
  }, 30000);

  // 로그인 화면 숨김
  const screen = document.getElementById('login-screen');
  screen.classList.add('hide');
  setTimeout(() => { screen.style.display = 'none'; }, 300);

  // 사이드바 헤더에 현재 멤버 표시
  const logoSub = document.querySelector('.logo-sub');
  if (logoSub) logoSub.textContent = `${member} 접속 중`;

  // 현지지(관리자)면 권한 관리 메뉴 표시
  const permNav = document.getElementById('nav-permissions');
  if (permNav) permNav.style.display = member === '현지지' ? '' : 'none';
  const settingsNav = document.getElementById('nav-settings');
  if (settingsNav) settingsNav.style.display = member === '현지지' ? '' : 'none';

  // 권한 로드 및 적용
  loadPermissions();

  // 접속자 목록 새로고침
  refreshOnlineStatus();
  updateSidebarOnline(Object.keys(getOnlineMembers()).filter(n => {
    const ts = getOnlineMembers()[n];
    return Date.now() - ts < 10 * 60 * 1000;
  }));
}

// 탭/창 닫을 때 오프라인 처리
window.addEventListener('beforeunload', () => {
  if (currentMember) setOffline(currentMember);
});

// 다른 탭에서 상태 변경 시 갱신
window.addEventListener('storage', (e) => {
  if (e.key === STORAGE_KEY) refreshOnlineStatus();
});

// 5초마다 접속자 상태 새로고침 (Firebase 리스너가 주, polling은 보조)
setInterval(() => {
  // Firebase 리스너가 실시간으로 처리하므로 로컬만 체크
  refreshOnlineStatus();
}, 10000);

// 초기 상태 갱신
refreshOnlineStatus();


// ══ 권한 관리 ══════════════════════════════════════════════════════

const MENU_LIST = [
  { key: 'dashboard',  label: '대시보드',          icon: '⊞' },
  { key: 'accounting', label: '회계 / 모임통장',   icon: '💳' },
  { key: 'pnl',        label: '행사 손익',          icon: '★' },
  { key: 'cost',       label: '원가 관리',          icon: '📦' },
  { key: 'orders',     label: '제작 의뢰',          icon: '≡' },
  { key: 'inventory',  label: '재고·판매',          icon: '📅' },
  { key: 'kanban',     label: '굿즈제작 작업현황',  icon: '▦' },
  { key: 'artists',    label: '작가 / 모집',        icon: '👤' },
  { key: 'vendors',    label: '제작 업체',          icon: '🏭' },
];

const PERM_MEMBERS = ['현지지', '감찬', '안알려줌', '디네'];

// 기본 권한: 모두 허용
let permissions = {};
PERM_MEMBERS.forEach(m => {
  permissions[m] = {};
  MENU_LIST.forEach(menu => { permissions[m][menu.key] = true; });
});

// Firebase에서 권한 로드
async function loadPermissions() {
  try {
    if (!window.fbDb) return;
    const { doc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap = await getDoc(doc(window.fbDb, 'standup_app', 'permissions'));
    if (snap.exists()) {
      const loaded = JSON.parse(snap.data().data);
      // 기존 데이터 병합 (새 메뉴가 추가됐을 때 기본값 유지)
      PERM_MEMBERS.forEach(m => {
        if (loaded[m]) {
          MENU_LIST.forEach(menu => {
            if (loaded[m][menu.key] !== undefined) {
              permissions[m][menu.key] = loaded[m][menu.key];
            }
          });
        }
      });
    }
  } catch(e) { console.error('loadPermissions:', e); }
  applyPermissions();
}

// Firebase에 권한 저장
async function savePermissions() {
  // 테이블에서 현재 상태 읽기
  PERM_MEMBERS.forEach(member => {
    MENU_LIST.forEach(menu => {
      const toggle = document.getElementById(`perm-${member}-${menu.key}`);
      if (toggle) permissions[member][menu.key] = toggle.checked;
    });
  });

  try {
    if (window.fbSave) {
      // fbSave 패턴 활용
      const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      await setDoc(doc(window.fbDb, 'standup_app', 'permissions'), {
        data: JSON.stringify(permissions)
      });
    }
  } catch(e) { console.error('savePermissions:', e); }

  applyPermissions();

  // 저장 완료 표시
  const btn = document.querySelector('.btn-primary[onclick="savePermissions()"]');
  if (btn) {
    btn.textContent = '✓ 저장됨';
    btn.style.background = 'var(--green)';
    setTimeout(() => {
      btn.textContent = '저장하기';
      btn.style.background = '';
    }, 2000);
  }
}

// 권한 적용: 현재 로그인 멤버 기준으로 메뉴 표시/숨김
function applyPermissions() {
  if (!currentMember || currentMember === '현지지') {
    // 관리자(현지지)는 항상 모두 표시
    document.querySelectorAll('.nav-item').forEach(el => el.style.display = '');
    return;
  }
  const memberPerms = permissions[currentMember];
  if (!memberPerms) return;

  document.querySelectorAll('.nav-item').forEach(navEl => {
    const txt = navEl.textContent.trim();
    for (const menu of MENU_LIST) {
      if (txt === NAV_MAP[menu.key] || txt.startsWith(NAV_MAP[menu.key])) {
        navEl.style.display = memberPerms[menu.key] === false ? 'none' : '';
        break;
      }
    }
  });
}

// 권한 관리 페이지 렌더링
function renderPermTable() {
  const tbody = document.getElementById('perm-table-body');
  if (!tbody) return;

  tbody.innerHTML = MENU_LIST.map(menu => `
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:12px 20px;font-size:13px;font-weight:500;color:var(--text)">${menu.icon} ${menu.label}</td>
      ${PERM_MEMBERS.map(member => `
        <td style="text-align:center;padding:12px 16px">
          <label class="toggle-wrap" style="display:inline-flex;align-items:center;cursor:pointer">
            <input type="checkbox" id="perm-${member}-${menu.key}"
              ${(permissions[member]?.[menu.key] !== false) ? 'checked' : ''}
              ${(menu.key === 'dashboard') ? 'disabled' : ''}
              style="display:none"
              onchange="updatePermToggle(this)">
            <div class="toggle-track" style="
              width:36px;height:20px;border-radius:10px;
              background:${(permissions[member]?.[menu.key] !== false) ? 'var(--amber)' : 'var(--border2)'};
              position:relative;transition:background .2s;
              ${menu.key === 'dashboard' ? 'opacity:.4;' : ''}
            ">
              <div style="
                position:absolute;top:2px;
                left:${(permissions[member]?.[menu.key] !== false) ? '18px' : '2px'};
                width:16px;height:16px;border-radius:50%;
                background:#fff;transition:left .2s;
              "></div>
            </div>
          </label>
        </td>`).join('')}
    </tr>`).join('');
}

function updatePermToggle(checkbox) {
  const track = checkbox.nextElementSibling;
  const dot = track.querySelector('div');
  if (checkbox.checked) {
    track.style.background = 'var(--amber)';
    dot.style.left = '18px';
  } else {
    track.style.background = 'var(--border2)';
    dot.style.left = '2px';
  }
}

// 권한 실시간 리스너 (다른 멤버가 권한 변경 시 즉시 반영)
window.fbListenPermissions = function(fbListenFn) {
  fbListenFn('permissions', (data) => {
    if (data && typeof data === 'object') {
      PERM_MEMBERS.forEach(m => {
        if (data[m]) {
          MENU_LIST.forEach(menu => {
            if (data[m][menu.key] !== undefined) {
              permissions[m][menu.key] = data[m][menu.key];
            }
          });
        }
      });
      applyPermissions();
    }
  });
};


// ══ 백업 / 복원 / 초기화 ═══════════════════════════════════════════

function backupData() {
  const backup = {
    version: 1,
    date: new Date().toISOString(),
    data: {
      txData:      window.txData      || [],
      costData:    window.costData    || [],
      orderData:   window.orderData   || [],
      invData:     window.invData     || [],
      tasks:       window.tasks       || [],
      recruitData: window.recruitData || [],
      vendors:     window.vendors     || [],
      eventList:   window.eventList   || [],
    }
  };

  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href     = url;
  a.download = `standup_backup_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function restoreData(input) {
  const file = input.files[0];
  if (!file) return;

  document.getElementById('restore-filename').textContent = file.name;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.data) { alert('올바른 백업 파일이 아니에요.'); return; }

      openConfirm(
        `<b>${file.name}</b> 파일로 데이터를 복원할까요?<br><span style="color:var(--coral);font-size:12px">현재 데이터가 모두 덮어씌워져요.</span>`,
        async () => {
          const d = backup.data;
          if (d.txData)      { window.txData      = d.txData;      if(window.fbSave) await fbSave('txData'); }
          if (d.costData)    { window.costData    = d.costData;    if(window.fbSave) await fbSave('costData'); }
          if (d.orderData)   { window.orderData   = d.orderData;   if(window.fbSave) await fbSave('orderData'); }
          if (d.invData)     { window.invData      = d.invData;     if(window.fbSave) await fbSave('invData'); }
          if (d.tasks)       { window.tasks       = d.tasks;       if(window.fbSave) await fbSave('tasks'); }
          if (d.recruitData) { window.recruitData = d.recruitData; if(window.fbSave) await fbSave('recruitData'); }
          if (d.vendors)     { window.vendors     = d.vendors;     if(window.fbSave) await fbSave('vendors'); }
          if (d.eventList)   { window.eventList   = d.eventList;   if(window.fbSave) await fbSave('eventList'); }

          alert(`✓ 복원 완료!\n백업 날짜: ${backup.date?.slice(0,10) || '알 수 없음'}`);
          navigate('dashboard');
        }
      );
    } catch(err) {
      alert('파일을 읽는 중 오류가 발생했어요.\n올바른 JSON 파일인지 확인해주세요.');
    }
  };
  reader.readAsText(file);
}

function selectAllReset(val) {
  ['accounting','cost','orders','inventory','kanban','artists','vendors','events'].forEach(id => {
    const el = document.getElementById('reset-' + id);
    if (el) el.checked = val;
  });
}

function confirmReset() {
  const targets = [
    { id: 'reset-accounting', key: 'txData',      label: '회계/모임통장',    empty: [] },
    { id: 'reset-cost',       key: 'costData',    label: '원가 관리',        empty: [] },
    { id: 'reset-orders',     key: 'orderData',   label: '제작 의뢰',        empty: [] },
    { id: 'reset-inventory',  key: 'invData',     label: '재고·판매',        empty: [] },
    { id: 'reset-kanban',     key: 'tasks',       label: '칸반',             empty: [] },
    { id: 'reset-artists',    key: 'recruitData', label: '작가/모집',        empty: [] },
    { id: 'reset-vendors',    key: 'vendors',     label: '제작 업체',        empty: [] },
    { id: 'reset-events',     key: 'eventList',   label: '행사 일정',        empty: [] },
  ];

  const selected = targets.filter(t => {
    const el = document.getElementById(t.id);
    return el && el.checked;
  });

  if (selected.length === 0) {
    alert('초기화할 항목을 선택해주세요.'); return;
  }

  const names = selected.map(t => t.label).join(', ');
  openConfirm(
    `<span style="color:var(--coral);font-weight:700">다음 데이터를 초기화할까요?</span><br><br>
     <b>${names}</b><br><br>
     <span style="font-size:12px;color:var(--text3)">이 작업은 되돌릴 수 없어요.</span>`,
    async () => {
      for (const t of selected) {
        window[t.key] = t.empty;
        if (window.fbSave) await fbSave(t.key);
      }
      alert(`✓ 초기화 완료!\n${names}`);
      navigate('dashboard');
    }
  );
}

// Boot - Firebase 로딩 완료 후 navigate 호출됨
// Firebase 모듈이 로드 안 됐을 경우 fallback
setTimeout(() => {
  if (!window.fbReady && typeof navigate === 'function') {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => navigate('dashboard'));
    } else {
      navigate('dashboard');
    }
  }
}, 800);
</script>
<script type="module">
// ══ Firebase 초기화 ══════════════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDd85t65S0F5sZSsiYCwQMSnmw0Jt3HlEg",
  authDomain: "standupp-7cfeb.firebaseapp.com",
  projectId: "standupp-7cfeb",
  storageBucket: "standupp-7cfeb.firebasestorage.app",
  messagingSenderId: "390358747706",
  appId: "1:390358747706:web:aaec773c9d95397ea78303",
  measurementId: "G-X6R24E8JNP"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Firestore 컬렉션 키 매핑 ──────────────────────────────────────
const COL = 'standup_app';  // 최상위 문서
const COLLECTIONS = {
  txData:      'accounting',
  costData:    'cost',
  orderData:   'orders',
  invData:     'inventory',
  tasks:       'kanban',
  recruitData: 'artists',
  vendors:     'vendors',
  eventList:   'events',
  onlineMembers: 'presence',
  permissions: 'permissions',
};

// ── 저장 함수 ─────────────────────────────────────────────────────
window.fbSave = async function(key) {
  try {
    const data = window[key];
    if (!data) return;
    await setDoc(doc(db, COL, COLLECTIONS[key]), { data: JSON.stringify(data) });
    showSaveIndicator();
  } catch(e) {
    console.error('fbSave error:', key, e);
  }
};

// ── 불러오기 함수 ─────────────────────────────────────────────────
async function fbLoad(key) {
  try {
    const snap = await getDoc(doc(db, COL, COLLECTIONS[key]));
    if (snap.exists()) {
      const parsed = JSON.parse(snap.data().data);
      window[key] = parsed;
      return parsed;
    }
  } catch(e) {
    console.error('fbLoad error:', key, e);
  }
  return null;
}

// ── 실시간 리스너 ─────────────────────────────────────────────────
function fbListen(key, onUpdate) {
  return onSnapshot(doc(db, COL, COLLECTIONS[key]), (snap) => {
    if (!snap.exists()) return;
    try {
      const parsed = JSON.parse(snap.data().data);
      window[key] = parsed;
      onUpdate(parsed);
    } catch(e) {}
  });
}

// ── 저장 인디케이터 ───────────────────────────────────────────────
function showSaveIndicator() {
  let el = document.getElementById('save-indicator');
  if (!el) {
    el = document.createElement('div');
    el.id = 'save-indicator';
    el.style.cssText = `
      position:fixed;bottom:20px;right:20px;z-index:9998;
      background:var(--green-dim);color:var(--green);
      border:1px solid var(--green);border-radius:8px;
      padding:8px 14px;font-size:12px;font-family:'DM Mono',monospace;
      animation:fadeUp .2s ease;pointer-events:none;
    `;
    document.body.appendChild(el);
  }
  el.textContent = '✓ 저장됨';
  el.style.opacity = '1';
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

// ── 접속자 관리 (Firestore) ───────────────────────────────────────
window.fbSetOnline = async function(member) {
  try {
    const onlineRef = doc(db, COL, COLLECTIONS.onlineMembers);
    const snap = await getDoc(onlineRef);
    const current = snap.exists() ? JSON.parse(snap.data().data) : {};
    current[member] = Date.now();
    await setDoc(onlineRef, { data: JSON.stringify(current) });
  } catch(e) {}
};

window.fbSetOffline = async function(member) {
  try {
    const onlineRef = doc(db, COL, COLLECTIONS.onlineMembers);
    const snap = await getDoc(onlineRef);
    if (!snap.exists()) return;
    const current = JSON.parse(snap.data().data);
    delete current[member];
    await setDoc(onlineRef, { data: JSON.stringify(current) });
  } catch(e) {}
};

// ── 모든 데이터 초기 로드 + 리스너 등록 ──────────────────────────
async function initFirebase() {
  // 로딩 표시
  const main = document.getElementById('main-content');
  if (main) main.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite"></div><div style="font-size:13px;color:var(--text3)">데이터 불러오는 중...</div></div>';

  // 로딩 애니메이션 CSS 추가
  if (!document.getElementById('spin-style')) {
    const style = document.createElement('style');
    style.id = 'spin-style';
    style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(style);
  }

  // 모든 데이터 병렬 로드
  const keys = ['txData','costData','orderData','invData','tasks','recruitData','vendors','eventList'];
  await Promise.all(keys.map(k => fbLoad(k)));

  // 첫 로드 후 로컬 데이터가 없으면 현재 앱 데이터를 Firebase에 업로드
  // (최초 1회)
  for (const k of keys) {
    const snap = await getDoc(doc(db, COL, COLLECTIONS[k]));
    if (!snap.exists() && window[k] && window[k].length > 0) {
      await setDoc(doc(db, COL, COLLECTIONS[k]), { data: JSON.stringify(window[k]) });
      console.log(`초기 업로드: ${k}`);
    }
  }

  // 실시간 리스너 등록
  const renderMap = {
    txData:      () => { if(typeof renderTable==='function') renderTable(window._tf||'all'); },
    costData:    () => { if(typeof renderCost==='function')  renderCost(window._cf||'all'); },
    orderData:   () => { if(typeof renderOrders==='function') renderOrders(window._of||'all'); },
    invData:     () => { if(typeof renderInv==='function')   renderInv(window._iv||'all'); },
    tasks:       () => { if(typeof renderBoard==='function') renderBoard(); },
    recruitData: () => { if(typeof renderRecruitList==='function') renderRecruitList(); },
    vendors:     () => { if(typeof renderVendors==='function') renderVendors(window._vf||'all'); },
    eventList:   () => { if(typeof renderEventListPanel==='function') renderEventListPanel(); },
  };

  keys.forEach(key => {
    fbListen(key, () => {
      // 현재 해당 페이지가 열려있을 때만 리렌더
      const pageMap = {
        txData:'accounting', costData:'cost', orderData:'orders',
        invData:'inventory', tasks:'kanban', recruitData:'artists',
        vendors:'vendors', eventList:'dashboard'
      };
      if (window.currentPage === pageMap[key] || window.currentPage === 'dashboard') {
        renderMap[key]?.();
      }
    });
  });

  // 권한 실시간 리스너
  if (typeof fbListenPermissions === 'function') fbListenPermissions(fbListen);

  // 접속자 실시간 리스너
  fbListen('onlineMembers', (data) => {
    const now = Date.now();
    const active = Object.entries(data).filter(([,ts]) => now - ts < 10*60*1000).map(([n])=>n);
    if (typeof updateSidebarOnline === 'function') updateSidebarOnline(active);
    if (typeof refreshOnlineStatus === 'function') refreshOnlineStatus(active);
  });

  // 대시보드로 이동
  if (typeof navigate === 'function') navigate('dashboard');
}

// ── 데이터 변경 시 자동 저장 (각 CRUD 함수에 훅 추가) ──────────────
// navigate 완료 후 훅 설정
window.fbReady = true;
window.fbDb = db;
window.addEventListener('load', () => {
  setTimeout(initFirebase, 100);
});

// 페이지 닫을 때 오프라인 처리
window.addEventListener('beforeunload', () => {
  if (window.currentMember) fbSetOffline(window.currentMember);
});

</script>

</body>
